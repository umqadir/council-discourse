name: Auto-fix pipeline failures

# When a production run fails, an agent diagnoses it from the failed logs and
# either pushes a tested fix, or opens/updates an issue when the cause is not
# code (credits, provider outage). Repeat-firing is bounded by production's
# own circuit breaker (3 consecutive scheduled failures halt the cron).
on:
  workflow_run:
    workflows: ["Production pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed production run id to diagnose (testing/manual)"
        required: true

concurrency:
  group: auto-fix
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: read
  id-token: write

jobs:
  fix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /usr/local/bin >/dev/null

      # One agent per red streak. If a fixer already completed since the last
      # green production run and production is red again, that fixer's theory
      # failed; a second agent re-deriving the same diagnosis is waste, and a
      # fix->dispatch->fail loop would spawn agents forever. Skip the agent
      # and escalate to a human once, deterministically. A green production
      # run resets the gate.
      - name: Single-flight gate
        id: gate
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          last_green="$(gh api "repos/${REPO}/actions/workflows/production.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].run_started_at // "1970-01-01T00:00:00Z"')"
          # Count only runs where the agent step actually executed. A run
          # whose fix job was skipped (production succeeded) or where this
          # gate itself skipped the agent still completes "success", so run
          # conclusions cannot distinguish a real attempt; inspect the
          # "Diagnose and fix" step inside each run instead.
          prior=0
          for id in $(gh api -X GET "repos/${REPO}/actions/workflows/auto-fix.yml/runs" \
            -f status=completed -f created=">=${last_green}" -f per_page=100 \
            --jq '.workflow_runs[].id'); do
            ran="$(gh api "repos/${REPO}/actions/runs/${id}/jobs" \
              --jq '[.jobs[].steps[]? | select(.name == "Diagnose and fix") | select(.conclusion == "success" or .conclusion == "failure")] | length')"
            prior=$((prior + ran))
          done
          echo "completed fixer runs since last green production ($last_green): $prior"
          if [ "$prior" -eq 0 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::warning::A fixer already ran this red streak - not spawning another agent."
          marker="fixer already attempted this outage"
          body="@umqadir - production failed again (${{ github.event.workflow_run.html_url }}) after a ${marker}; not spawning another agent. A human needs to look."
          number="$(gh issue list --repo "$REPO" --state open --search "in:title \"Pipeline needs attention\"" --json number --jq '.[0].number // empty')"
          if [ -z "$number" ]; then
            gh issue create --repo "$REPO" --assignee umqadir \
              --title "Pipeline needs attention: still failing after an automated fix attempt" \
              --body "$body"
          else
            last_comment="$(gh api "repos/${REPO}/issues/${number}/comments" --jq 'last.body // ""')"
            case "$last_comment" in
              *"$marker"*) echo "escalation already posted; staying quiet" ;;
              *) gh issue comment "$number" --repo "$REPO" --body "$body" ;;
            esac
          fi

      - name: Diagnose and fix
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.skip != 'true' }}
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Least-privilege toolset, mirroring the action's official
          # ci-failure-auto-fix example, adapted to this repo's stack.
          claude_args: "--model claude-opus-4-8 --effort high --max-turns 80 --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,WebFetch,WebSearch,Bash(git:*),Bash(gh:*),Bash(uv:*),Bash(actionlint:*),Bash(sqlite3:*)'"
          # Public repo: the fixer's reasoning in the run log is transparency,
          # and without it a silent SDK failure is undiagnosable (learned the
          # hard way — a 2-second "success" that did nothing).
          show_full_output: "true"
          prompt: |
            You are the on-call fixer for this repository's production pipeline.
            Production run ${{ github.event.workflow_run.id || inputs.run_id }} concluded FAILURE:
            ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, inputs.run_id) }}

            Investigate first, decide second:
            1. Read STATE.md fully — it defines the state model and the
               invariants; any fix must preserve them. Check `git log --oneline -15`
               for context and for whether a fix was already pushed after the
               failure started (if so, verify it addresses the cause and stop).
            2. Diagnose from evidence:
               `gh run view ${{ github.event.workflow_run.id || inputs.run_id }} --log-failed`
               (and `--log` for surrounding context if needed).

            Then take exactly one of these paths:
            - Genuinely external (exhausted OpenRouter credits, Mistral or
              Google auth/billing, an upstream service outage): nothing in
              this repo can fix it. Open or update a GitHub issue titled
              "Pipeline needs attention: <cause>" with the specifics and the
              exact recovery step, then stop.
            - Transient one-off (e.g. a single network timeout the next cron
              will clear): do nothing but say so clearly in your final message.
            - Anything else — a code defect, or pipeline state wedged by one
              (a deterministically failing meeting, a breaker halt whose root
              cause you can fix): fix it END TO END; do not stop at a
              diagnosis. Implement the minimal clean fix at the root cause —
              no defensive band-aids around a broken contract. Verify claims
              before treating them as constraints (e.g. check a model's actual
              context window via its provider's API rather than assuming).
              You MUST run `uv run pytest tests/ -q` and
              `actionlint .github/workflows/production.yml` and get them fully
              green. Only then commit to main with a clear imperative message
              and push. If the durable fix needs real architectural rework,
              still apply the smallest sound unblock now (recalibrate a
              miscalibrated guard with a test, park the poison meeting), push
              it, and open an assigned issue describing the rework. If you
              cannot get green, open an issue with your diagnosis and
              proposed patch instead.

            After pushing a fix that unblocks a halted or failing pipeline,
            re-arm it yourself: `gh workflow run production.yml` (a dispatch
            bypasses the schedule-gated breaker; the preflight credit gate and
            the breaker bound spend). At most one dispatch per fixer run, only
            after your fix is pushed, and never if a previous fixer run
            already dispatched for this same cause and it failed again — that
            means your theory is wrong; escalate via issue instead.

            Registry surgery (data/registry.db via sqlite3) is a legitimate
            recovery tool, under these invariants:
            - Read STATE.md's state model first. Never regress a stage status
              and never delete a row — paid work must stay recorded.
            - Adjusting process_attempts / last_error to park or un-park a
              meeting is the expected use; rewriting statuses is not.
            - Do not edit the registry while a production run is in progress
              or queued (`gh run list --workflow=production.yml` first) — its
              export job commits the registry and will race you.
            - Commit the registry change as its own commit and rebase onto
              origin/main immediately before pushing.

            Hard rules:
            - Any issue you open MUST be assigned to the maintainer
              (`gh issue create --assignee umqadir ...`) and start its body
              with "@umqadir" - they do not watch this repo, so an unassigned,
              unmentioned issue reaches no one. When updating an existing issue,
              add the "@umqadir" mention in your comment.
            - Never delete or overwrite R2 artifacts, and never re-run a paid
              stage whose artifact already persists on R2 — restore-and-resume
              is the contract. site/src/data/meetings/ is export-owned; leave
              it to the pipeline.
            - Never disable, weaken, or work around a failing guard, test, or
              invariant to make the run pass — those exist to fail. If a guard
              is provably miscalibrated, recalibrating it WITH an updated test
              is a fix; deleting or bypassing it is not.
            - Keep commits focused. If main moved while you worked, rebase
              onto origin/main before pushing.

      # The action can report success while the SDK errored before doing any
      # work (observed: "Credit balance is too low" on a green step). A fixer
      # that silently does nothing is worse than no fixer.
      - name: Fail if the fixer errored silently
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate.outputs.skip != 'true' }}
        run: |
          f=/home/runner/work/_temp/claude-execution-output.json
          if [ ! -f "$f" ]; then
            echo "::error::no execution output produced"
            exit 1
          fi
          errored=$(jq -r 'map(select(.type=="result")) | last | .is_error // false' "$f")
          if [ "$errored" = "true" ]; then
            message=$(jq -r 'map(select(.type=="result")) | last | .result // "unknown"' "$f")
            echo "::error::fixer errored without working: $message"
            exit 1
          fi