name: Auto-fix pipeline failures

# When a production run fails, an agent diagnoses it from the failed logs and
# either pushes a tested fix, or opens/updates an issue when the cause is not
# code (credits, provider outage). Repeat-firing is bounded by production's
# own circuit breaker (3 consecutive scheduled failures halt the cron).
on:
  workflow_run:
    workflows: ["Production pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed production run id to diagnose (testing/manual)"
        required: true

concurrency:
  group: auto-fix
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: read
  id-token: write

jobs:
  fix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /usr/local/bin >/dev/null

      - name: Diagnose and fix
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Least-privilege toolset, mirroring the action's official
          # ci-failure-auto-fix example, adapted to this repo's stack.
          claude_args: "--model claude-opus-4-8 --max-turns 80 --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(uv:*),Bash(actionlint:*),Bash(sqlite3:*)'"
          # Public repo: the fixer's reasoning in the run log is transparency,
          # and without it a silent SDK failure is undiagnosable (learned the
          # hard way — a 2-second "success" that did nothing).
          show_full_output: "true"
          prompt: |
            You are the on-call fixer for this repository's production pipeline.
            Production run ${{ github.event.workflow_run.id || inputs.run_id }} concluded FAILURE:
            ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, inputs.run_id) }}

            Investigate first, decide second:
            1. Read STATE.md fully — it defines the state model and the
               invariants; any fix must preserve them. Check `git log --oneline -15`
               for context and for whether a fix was already pushed after the
               failure started (if so, verify it addresses the cause and stop).
            2. Diagnose from evidence:
               `gh run view ${{ github.event.workflow_run.id || inputs.run_id }} --log-failed`
               (and `--log` for surrounding context if needed).

            Then take exactly one of these paths:
            - NOT code-fixable (exhausted OpenRouter credits, Mistral/Google
              auth or billing, an upstream service outage, the circuit breaker
              halting after repeated failures): do NOT change code. Open or
              update a GitHub issue titled "Pipeline needs attention:
              <cause>" with the specifics and the exact recovery step, then stop.
            - Transient one-off (e.g. a single network timeout the next cron
              will clear): do nothing but say so clearly in your final message.
            - A real defect in this repository: implement the minimal clean
              fix at the root cause — no defensive band-aids around a broken
              contract. You MUST run `uv run pytest tests/ -q` and
              `actionlint .github/workflows/production.yml` and get them fully
              green. Only then commit to main with a clear imperative message
              and push. If you cannot get green, or the fix requires an
              architectural judgment call, push nothing — open an issue with
              your diagnosis and proposed patch instead.

            Hard rules:
            - Any issue you open MUST be assigned to the maintainer
              (`gh issue create --assignee umqadir ...`) and start its body
              with "@umqadir" - they do not watch this repo, so an unassigned,
              unmentioned issue reaches no one. When updating an existing issue,
              add the "@umqadir" mention in your comment.
            - Never modify data/registry.db, site/src/data/meetings/, or any
              R2 object; never trigger paid processing yourself.
            - Never disable, weaken, or work around a failing guard, test, or
              invariant to make the run pass — those exist to fail.
            - One focused commit at most. If main moved while you worked,
              rebase your commit onto origin/main before pushing.

      # The action can report success while the SDK errored before doing any
      # work (observed: "Credit balance is too low" on a green step). A fixer
      # that silently does nothing is worse than no fixer.
      - name: Fail if the fixer errored silently
        run: |
          f=/home/runner/work/_temp/claude-execution-output.json
          if [ ! -f "$f" ]; then
            echo "::error::no execution output produced"
            exit 1
          fi
          errored=$(jq -r 'map(select(.type=="result")) | last | .is_error // false' "$f")
          if [ "$errored" = "true" ]; then
            message=$(jq -r 'map(select(.type=="result")) | last | .result // "unknown"' "$f")
            echo "::error::fixer errored without working: $message"
            exit 1
          fi