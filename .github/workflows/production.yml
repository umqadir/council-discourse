name: Production pipeline

on:
  schedule:
    - cron: "0 13-23/2 * * *"
    - cron: "0 1-3/2 * * *"
  workflow_dispatch:

concurrency:
  group: production-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  UV_CACHE_DIR: .uv-cache
  PYTHONUNBUFFERED: "1"
  R2_BUCKET: council-discourse-videos
  VIDEO_BASE_URL: ${{ vars.VIDEO_BASE_URL }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_pending: ${{ steps.discover.outputs.has_pending }}
    env:
      LEGISTAR_TOKEN: ${{ secrets.LEGISTAR_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg poppler-utils

      # Circuit breaker: if the last 6 completed runs all failed, something is
      # systematically broken - stop cron retries (and repeated spend) until a
      # human intervenes. Judged across ALL run types so that one green manual
      # dispatch after a fix re-arms the cron; a schedule-only window would
      # deadlock (dispatched successes never enter it).
      #
      # The window MUST exceed the per-meeting dead-letter cap (5 attempts, see
      # process_attempts in pipeline/production.py). A single deterministically-
      # failing meeting fails 5 runs, then parks itself and the 6th run goes
      # green - so the breaker should fire only on failures that persist past
      # what per-meeting parking can clear, i.e. a genuinely systemic fault.
      - name: Halt after repeated failures
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # An open "Pipeline needs attention" issue means the outage has been
          # handed to a human (by the fixer or its gate): pause the cron
          # immediately instead of failing on repeat until the count-based
          # breaker trips. A green manual dispatch closes the issue (deploy
          # job) and re-arms the cron. Quarantine issues ("Meetings
          # quarantined", "Meetings skipped by export") do NOT pause anything.
          open_attention="$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "in:title \"Pipeline needs attention\"" --json number --jq '.[0].number // empty')"
          if [ -n "$open_attention" ]; then
            echo "::error::Pipeline paused: open 'Pipeline needs attention' issue #${open_attention} hands this outage to a human. Fix the cause, then dispatch production.yml; a green run closes the issue and re-arms the cron."
            exit 1
          fi
          conclusions="$(gh api "repos/${{ github.repository }}/actions/workflows/production.yml/runs?status=completed&per_page=6" \
            --jq '[.workflow_runs[].conclusion]')"
          echo "last completed conclusions: $(echo "$conclusions" | jq -r 'join(",")')"
          total="$(echo "$conclusions" | jq 'length')"
          failures="$(echo "$conclusions" | jq 'map(select(. == "failure")) | length')"
          if [ "$total" -ge 6 ] && [ "$failures" -eq "$total" ]; then
            echo "::error::Last 6 runs all failed - halting cron retries to stop repeated spend. Fix the cause, then dispatch manually; a green dispatched run re-arms the cron."
            exit 1
          fi

      - name: Preflight API checks
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request

          def get(url, key=None):
              headers = {"Authorization": f"Bearer {key}"} if key else {}
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          failed = False
          try:
              data = get("https://openrouter.ai/api/v1/credits", os.environ["OPENROUTER_API_KEY"])["data"]
              remaining = float(data["total_credits"]) - float(data["total_usage"])
              print(f"openrouter credits remaining: ${remaining:.2f}")
              # A full 12-meeting batch costs ~$2.6 of LLM work; require headroom
              # so a run never passes preflight and then dies mid-batch on 402s.
              if remaining < 4.0:
                  print("::error::OpenRouter credits below $4 - add credits at https://openrouter.ai/settings/credits before meetings can be processed")
                  failed = True
          except Exception as exc:
              print(f"::error::OpenRouter preflight failed: {exc}")
              failed = True
          try:
              get("https://api.mistral.ai/v1/models", os.environ["MISTRAL_API_KEY"])
              print("mistral auth: ok")
          except Exception as exc:
              print(f"::error::Mistral preflight failed (check key/billing): {exc}")
              failed = True
          try:
              get(f"https://generativelanguage.googleapis.com/v1beta/models?key={os.environ['GOOGLE_API_KEY']}&pageSize=1")
              print("google auth: ok")
          except Exception as exc:
              print(f"::error::Google preflight failed (naming verification depends on it): {exc}")
              failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Discover pending meetings
        id: discover
        run: |
          uv run python -m pipeline discover --emit-pending-json --pending-limit 12 > /tmp/pending.json
          matrix="$(cat /tmp/pending.json)"
          has_pending="$(MATRIX_FILE=/tmp/pending.json python - <<'PY'
          import json
          import os
          
          print("true" if json.load(open(os.environ["MATRIX_FILE"])).get("include") else "false")
          PY
          )"
          {
            echo "matrix<<JSON"
            printf '%s\n' "$matrix"
            echo "JSON"
            echo "has_pending=$has_pending"
          } >> "$GITHUB_OUTPUT"

      # A meeting at the retry cap is excluded from processing, but it must
      # never rot silently: the pipeline goes green without it and the
      # watchdog stays quiet. Surface every parked meeting on an assigned
      # issue until a human or the auto-fixer un-parks it (reset
      # process_attempts; artifacts persist on R2, so nothing is re-paid).
      # Deduped: posts only when the parked set changes.
      - name: Alert on parked meetings
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          parked="$(sqlite3 data/registry.db "SELECT meeting_key || ' | ' || COALESCE(body_name,'?') || ' | ' || COALESCE(substr(event_date,1,10),'?') || ' | ' || COALESCE(replace(substr(last_error,1,140), char(10), ' '),'no recorded error') FROM meetings WHERE process_attempts >= 5 AND chapterize_status != 'chapterized' ORDER BY meeting_key;")"
          if [ -z "$parked" ]; then
            echo "no parked meetings"
            open="$(gh issue list --repo "$REPO" --state open --search "in:title \"Meetings quarantined\"" --json number --jq '.[0].number // empty')"
            if [ -n "$open" ]; then
              gh issue close "$open" --repo "$REPO" --comment "No meetings remain quarantined; closing."
            fi
            exit 0
          fi
          echo "parked meetings:"
          echo "$parked"
          title="Meetings quarantined: excluded from processing until reset"
          body="$(printf '@umqadir - these meetings are quarantined (retry cap reached or parked by the fixer) and excluded from processing until process_attempts is reset (recovery in STATE.md; paid artifacts persist on R2, nothing is re-paid on retry). The rest of the pipeline continues normally.\n\n%s' "$parked")"
          number="$(gh issue list --repo "$REPO" --state open --search "in:title \"Meetings quarantined\"" --json number --jq '.[0].number // empty')"
          if [ -z "$number" ]; then
            gh issue create --repo "$REPO" --assignee umqadir --title "$title" --body "$body"
            exit 0
          fi
          opening="$(gh issue view "$number" --repo "$REPO" --json body --jq .body)"
          latest="$(gh api "repos/${REPO}/issues/${number}/comments" --jq 'last.body // ""')"
          if [ "$body" = "$opening" ] || [ "$body" = "$latest" ]; then
            echo "parked set unchanged; already reported on issue #$number"
          else
            gh issue comment "$number" --repo "$REPO" --body "$body"
          fi

      - name: Checkpoint registry
        run: uv run python -m pipeline checkpoint-db

      - name: Upload registry state
        uses: actions/upload-artifact@v4
        with:
          name: registry-state
          path: data/registry.db
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  process:
    needs: discover
    if: ${{ needs.discover.outputs.has_pending == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    env:
      LEGISTAR_TOKEN: ${{ secrets.LEGISTAR_TOKEN }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg poppler-utils rclone

      - name: Download registry state
        uses: actions/download-artifact@v4
        with:
          name: registry-state
          path: data

      # Runners are ephemeral but paid stage outputs (transcripts especially)
      # must not be. Restore any previously produced artifacts for this meeting
      # from R2 so a retry after a late-stage failure resumes at the failed
      # stage instead of re-paying transcription.
      - name: Restore stage artifacts from R2
        run: |
          # R2 credentials are mandatory in production: a silent no-op restore
          # makes the registry look ahead of the disk and re-pays transcription.
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::R2 credentials missing; refusing to process without artifact restore."
            exit 1
          fi
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          # Distinguish "nothing persisted yet" (fine) from a transport/auth
          # failure (must not proceed: reconcile would downgrade paid statuses).
          if rclone lsf "r2:${R2_BUCKET}/artifacts/${{ matrix.meeting_key }}" --s3-no-check-bucket --max-depth 1 > /tmp/persisted.txt; then
            if [ -s /tmp/persisted.txt ]; then
              rclone copy "r2:${R2_BUCKET}/artifacts/${{ matrix.meeting_key }}" \
                "data/meetings/${{ matrix.meeting_key }}" \
                --s3-no-check-bucket --transfers 4 --retries 3 \
                --exclude "result.json"
              echo "restored $(wc -l < /tmp/persisted.txt) persisted artifacts"
            else
              echo "no persisted artifacts for ${{ matrix.meeting_key }} (first attempt)"
            fi
          else
            echo "::error::could not list persisted artifacts on R2; aborting to avoid re-paying completed stages."
            exit 1
          fi
          ls -la "data/meetings/${{ matrix.meeting_key }}" 2>/dev/null || true

      - name: Process meeting
        run: |
          uv run python -m pipeline process-one \
            --meeting-key "${{ matrix.meeting_key }}" \
            --result-json "data/processed-results/${{ matrix.meeting_key }}.json" \
            --fail-on-error

      # Persist stage outputs even when a later stage failed, so the retry
      # starts from what this run already paid for.
      - name: Persist stage artifacts to R2
        if: ${{ always() }}
        run: |
          src="data/meetings/${{ matrix.meeting_key }}"
          if [ ! -d "$src" ]; then
            echo "no meeting directory produced"
            exit 0
          fi
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::warning::R2 credentials missing; stage artifacts will not be persisted."
            exit 0
          fi
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          rclone copy "$src" "r2:${R2_BUCKET}/artifacts/${{ matrix.meeting_key }}" \
            --s3-no-check-bucket --transfers 4 --retries 3 \
            --include "audio.m4a" \
            --include "meeting.json" \
            --include "agenda.txt" \
            --include "captions-clean.jsonl" \
            --include "captions-clean.txt" \
            --include "voxtral-batch-job.json" \
            --include "voxtral-transcript-part-*.json" \
            --include "name-speakers-chunk-*.json" \
            --include "utterances*.jsonl" \
            --include "chapters.json" \
            --include "meeting-derived.json" \
            --include "*-meta.json" \
            --include "gemini-runlog.jsonl"
          # The run's outcome record (artifacts/<key>/result.json) is persisted
          # by process-one itself, so it exists even when this step is skipped.

  export-site:
    needs:
      - discover
      - process
    if: ${{ always() && needs.discover.result == 'success' }}
    runs-on: ubuntu-latest
    # Deliberately NO LLM/API keys here: merge, export, build, and deploy make
    # no paid calls, and keeping the keys out makes that structural.
    env:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install R2 sync tool
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Download registry state
        uses: actions/download-artifact@v4
        with:
          name: registry-state
          path: data

      # Results live on R2 at paths the pipeline authors (artifacts/<key>/result.json),
      # written by process-one itself. Syncing ALL results every run makes the
      # merge idempotent and self-healing: a run whose registry commit was lost
      # gets re-merged on the next cycle instead of silently regressing.
      - name: Sync run results from R2
        run: |
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          rclone copy "r2:${R2_BUCKET}/artifacts" data/processed-results \
            --s3-no-check-bucket --include "*/result.json" \
            --transfers 8 --checkers 8 --retries 5

      - name: Merge registry results
        run: uv run python -m pipeline merge-results --results-dir data/processed-results

      - name: Verify every dispatched meeting is accounted for
        if: ${{ needs.discover.outputs.has_pending == 'true' }}
        env:
          MATRIX_JSON: ${{ needs.discover.outputs.matrix }}
        run: |
          uv run python -m pipeline verify-run-results \
            --results-dir data/processed-results \
            --matrix-json "$MATRIX_JSON"

      - name: CI health summary
        run: uv run python -m pipeline ci-health | tee -a "$GITHUB_STEP_SUMMARY"

      # A parked meeting (5 failed attempts) stopped costing money but needs a
      # human; keep an issue open until it is reset. Non-blocking: publishing
      # the rest of the batch must not depend on this.
      - name: Flag parked meetings as an issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          parked="$(uv run python -m pipeline ci-health | grep '^parked: ' || true)"
          [ -z "$parked" ] && { echo "no parked meetings"; exit 0; }
          title="Parked meetings need attention"
          body="$(printf 'These meetings hit the retry cap and are excluded from processing until reset:\n\n%s\n\nReset with: uv run python -m pipeline reset-meeting <key>, then commit the registry and dispatch a run.' "$parked")"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi

      # Fetch meeting dirs that export needs but this runner lacks: normally
      # just this run's completions; after a lost export, older orphans too.
      - name: Pull export inputs from R2
        run: uv run python -m pipeline pull-export-inputs

      # A meeting export had to skip (chapterized but artifacts missing on
      # R2) never blocks the run; it is reported here so a human decides:
      # restore the artifacts (often present locally in data/meetings/<key>/)
      # or reset the meeting. Self-closes when nothing is blocked.
      - name: Alert on export-blocked meetings
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          f=data/export-blocked.txt
          title="Meetings skipped by export: artifacts missing"
          number="$(gh issue list --repo "$REPO" --state open --search "in:title \"Meetings skipped by export\"" --json number --jq '.[0].number // empty')"
          if [ ! -s "$f" ]; then
            if [ -n "$number" ]; then
              gh issue close "$number" --repo "$REPO" --comment "No meetings remain export-blocked; closing."
            fi
            exit 0
          fi
          body="$(printf '@umqadir - these chapterized meetings have no artifacts on R2, so export skipped (re)publishing them; their existing pages keep serving and the pipeline continues normally. To fix: restore artifacts/<key>/ on R2 (complete copies usually exist locally in data/meetings/<key>/) or reset the meeting.\n\n%s' "$(cat "$f")")"
          if [ -z "$number" ]; then
            gh issue create --repo "$REPO" --assignee umqadir --title "$title" --body "$body"
          else
            latest="$(gh api "repos/${REPO}/issues/${number}/comments" --jq 'last.body // ""')"
            opening="$(gh issue view "$number" --repo "$REPO" --json body --jq .body)"
            if [ "$body" != "$latest" ] && [ "$body" != "$opening" ]; then
              gh issue comment "$number" --repo "$REPO" --body "$body"
            fi
          fi

      - name: Export site data
        run: uv run python -m pipeline export-site --allow-empty

      - name: Sync chapter data to R2
        run: |
          if [ ! -d site/r2-data/data ]; then
            echo "No chapter data exported"
            exit 0
          fi
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::warning::Skipping chapter data R2 sync because R2 credentials are not configured."
            exit 0
          fi
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          # copy (not sync): exports are incremental, and chapter-data keys are
          # content-hashed and immutable, so the bucket must accumulate.
          rclone copy site/r2-data/data "r2:${R2_BUCKET}/data" \
            --s3-no-check-bucket \
            --transfers 4 \
            --checkers 8 \
            --retries 5 \
            --low-level-retries 10

      - name: Install site dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: site
        env:
          SKIP_EXPORT: "1"
        run: pnpm build

      - name: Upload site dist
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          if-no-files-found: error
          retention-days: 7

      - name: Commit registry and site data
        run: |
          git add -f data/registry.db site/src/data/meetings
          if git diff --cached --quiet; then
            echo "No registry or site data changes"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "Update pipeline registry and site data [skip ci]"
          # main may have moved during the ~1h run (manual pushes, etc.).
          # Rebase onto latest and retry so a moving ref never fails the pipeline.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push rejected (attempt $attempt); rebasing onto origin/main"
            git fetch origin main
            if ! git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              rebase origin/main; then
              # The registry is a binary file, so a mid-run human push that
              # touched it conflicts deterministically. Never commit our stale
              # checkout tree over origin (that silently reverts human work);
              # instead rebuild the payload on top of origin's current state:
              # re-apply this run's result rows to origin's registry, re-export,
              # and commit only the payload paths.
              git rebase --abort
              git reset --hard origin/main
              uv run python -m pipeline merge-results --results-dir data/processed-results
              uv run python -m pipeline export-site --allow-empty
              git add -f data/registry.db site/src/data/meetings
              if git diff --cached --quiet; then
                echo "origin already contains this run's changes"; exit 0
              fi
              git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "Update pipeline registry and site data [skip ci]"
            fi
            sleep $((attempt * 3))
          done
          echo "::error::could not push registry/site data after retries"; exit 1

  deploy:
    needs: export-site
    if: ${{ always() && needs.export-site.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Download site dist
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: site/dist

      # Unconditional: a missing token must be a red run, never a silent skip.
      - name: Deploy Cloudflare Pages
        working-directory: site
        run: pnpm dlx wrangler pages deploy dist --project-name council-discourse

      # A green run means the outage is over: close its issues so the next
      # failure opens a fresh one instead of appending to a stale thread.
      # (The quarantined-meetings issue has its own lifecycle in discover.)
      - name: Close outage issues on green
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          for n in $(gh issue list --repo "$REPO" --state open --search "in:title \"Pipeline needs attention\"" --json number --jq '.[].number'); do
            gh issue close "$n" --repo "$REPO" \
              --comment "Resolved: production run ${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }} completed green."
          done
